<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Telegram Channel Updates</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#2196f3">
  <meta name="background-color" content="#0e1117">
  
  <!-- Android-specific PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-title" content="TG Updates">
  
  <!-- Apple-specific PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TG Updates">
  <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/static/icons/icon-72x72.png">
  <link rel="apple-touch-icon" sizes="96x96" href="/static/icons/icon-96x96.png">
  <link rel="apple-touch-icon" sizes="128x128" href="/static/icons/icon-128x128.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/static/icons/icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/icons/icon-192x192.png">
  
  <!-- Microsoft-specific PWA meta tags -->
  <meta name="msapplication-TileColor" content="#2196f3">
  <meta name="msapplication-TileImage" content="/static/icons/icon-144x144.png">
  
  <!-- Additional PWA meta tags -->
  <meta name="description" content="Real-time Telegram channel updates dashboard with auto-scrolling interface">
  <meta name="application-name" content="TG Updates">
  
  <!-- Prevent address bar from showing -->
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e1117;
      --card-bg: #1a1d27;
      --text: #e8eaed;
      --text-secondary: #9aa0a6;
      --accent: #2196f3;
      --accent-light: #1a3a5c;
      --border: #2d3240;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      flex-shrink: 0;
      gap: 16px;
      z-index: 10;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .header::-webkit-scrollbar {
      height: 3px;
    }

    .header::-webkit-scrollbar-track {
      background: transparent;
    }

    .header::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .header h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .header h1 svg { width: 20px; height: 20px; fill: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: auto;
    }

    .filter-bar { 
      display: flex; 
      gap: 5px; 
      overflow-x: auto;
      overflow-y: hidden;
      flex-wrap: nowrap;
      max-width: 500px;
      padding: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      scroll-behavior: smooth;
      flex-shrink: 1;
    }

    .filter-bar::-webkit-scrollbar {
      height: 4px;
    }

    .filter-bar::-webkit-scrollbar-track {
      background: transparent;
    }

    .filter-bar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .filter-btn {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .status {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4caf50; display: inline-block;
    }

    .status-dot.loading { background: #ff9800; animation: pulse 1s infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .scroll-viewport {
      flex: 1;
      overflow-y: auto;
      position: relative;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .scroll-viewport::-webkit-scrollbar { width: 6px; }
    .scroll-viewport::-webkit-scrollbar-track { background: transparent; }
    .scroll-viewport::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .scroll-track {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 12vw;
    }

    .post-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: row;
      min-height: calc(50vh - 40px);
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .post-card:hover { border-color: var(--accent); }

    .post-media-side {
      width: 40%;
      max-width: 500px;
      flex-shrink: 0;
      overflow: hidden;
      background: #111318;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .post-media-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .post-media-side.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      min-width: 80px;
      max-width: 80px;
    }

    .channel-icon-large {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center;
      justify-content: center; color: #fff; font-weight: 700;
      font-size: 1.5rem;
    }

    .channel-icon-large img {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
    }

    .post-content {
      flex: 1;
      padding: 28px 48px;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .post-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }

    .post-avatar-placeholder {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center;
      justify-content: center; color: #fff; font-weight: 700;
      font-size: 1rem; flex-shrink: 0;
    }

    .post-meta { flex: 1; min-width: 0; }

    .post-channel {
      font-weight: 600; font-size: 1.3rem; color: var(--text);
      text-decoration: none; display: block;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .post-channel:hover { color: var(--accent); }

    .post-date { font-size: 1rem; color: var(--text-secondary); }

    .post-body {
      flex: 1;
      overflow: hidden;
    }

    .post-text {
      font-size: 2rem;
      line-height: 1.55;
      word-wrap: break-word;
      overflow-wrap: break-word;
      color: var(--text);
    }

    .post-text a { color: var(--accent); text-decoration: none; }
    .post-text a:hover { text-decoration: underline; }

    .post-link-preview {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .post-link-preview:hover { border-color: var(--accent); }
    .post-link-preview-text { padding: 8px 12px; }

    .post-link-preview-title {
      font-weight: 600; font-size: 1.15rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--accent);
    }

    .post-link-preview-desc {
      font-size: 1.05rem; color: var(--text-secondary); margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .post-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 10px; font-size: 1.05rem; color: var(--text-secondary);
      margin-top: auto;
    }

    .post-views { display: flex; align-items: center; gap: 4px; }
    .post-views svg { width: 18px; height: 18px; fill: var(--text-secondary); }

    .post-open-link {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .post-open-link:hover { text-decoration: underline; }

    .loading-container {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-secondary); gap: 12px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg, .empty-msg { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    .error-msg { color: #ef5350; }

    /* Mobile Portrait Mode Support */
    @media (max-width: 768px) and (orientation: portrait) {
      /* Reduce horizontal padding for mobile */
      .scroll-track {
        padding: 16px 4vw;
      }

      /* Change post cards to vertical layout */
      .post-card {
        flex-direction: column;
        min-height: auto;
      }

      /* Media section adjustments for mobile */
      .post-media-side {
        width: 100%;
        max-width: none;
        height: 200px;
        flex-shrink: 0;
      }

      .post-media-side.empty {
        width: 100%;
        min-width: auto;
        max-width: none;
        height: 120px;
      }

      /* Content section mobile adjustments */
      .post-content {
        padding: 20px 16px;
      }

      /* Smaller typography for mobile */
      .post-text {
        font-size: 1.2rem;
        line-height: 1.5;
      }

      .post-channel {
        font-size: 1rem;
      }

      .post-date {
        font-size: 0.9rem;
      }

      /* Header adjustments for mobile */
      .header {
        padding: 0 16px;
      }

      .header h1 {
        font-size: 0.9rem;
      }

      .filter-bar {
        max-width: 250px;
      }

      .filter-btn {
        font-size: 0.8rem;
        padding: 3px 10px;
      }

      .status {
        font-size: 0.7rem;
      }

      /* Link preview adjustments */
      .post-link-preview-title {
        font-size: 1rem;
      }

      .post-link-preview-desc {
        font-size: 0.95rem;
      }

      /* Footer adjustments */
      .post-footer {
        font-size: 0.95rem;
      }

      /* Avatar and icon adjustments */
      .post-avatar, .post-avatar-placeholder {
        width: 32px;
        height: 32px;
      }

      .post-avatar-placeholder {
        font-size: 0.9rem;
      }

      .channel-icon-large {
        width: 48px;
        height: 48px;
        font-size: 1.3rem;
      }

      .channel-icon-large img {
        width: 48px;
        height: 48px;
      }

      /* Management container mobile adjustments */
      .management-container {
        margin: 10px;
        padding: 15px;
        max-height: calc(100vh - 80px);
        border-radius: 8px;
      }

      .management-section {
        margin-bottom: 20px;
      }

      .management-section h3 {
        font-size: 1.1rem;
        margin-bottom: 12px;
      }

      .settings-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .config-actions {
        position: sticky;
        bottom: 0;
        background: var(--card-bg);
        padding: 15px 0 0 0;
        border-top: 1px solid var(--border);
        margin-top: 20px;
      }

      .add-btn, .save-btn, .download-btn {
        font-size: 0.9rem;
        padding: 10px 16px;
      }
    }

    /* Management Interface Styles */
    .nav-links {
      display: flex;
      gap: 16px;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      padding: 6px 12px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--accent);
      background: var(--accent-light);
    }

    .management-container {
      display: none;
      padding: 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      margin: 20px;
      border: 1px solid var(--border);
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .management-container::-webkit-scrollbar {
      width: 6px;
    }

    .management-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .management-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .management-section {
      margin-bottom: 30px;
    }

    .management-section h3 {
      color: var(--accent);
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .channel-item input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.9rem;
    }

    .channel-item input:focus {
      outline: none;
    }

    .remove-btn {
      background: #ef5350;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .remove-btn:hover {
      background: #d32f2f;
    }

    .add-btn, .save-btn, .download-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-right: 10px;
    }

    .add-btn:hover, .save-btn:hover, .download-btn:hover {
      background: #1976d2;
    }

    .config-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .setting-item label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .setting-item input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 0.9rem;
    }

    .setting-item input:focus {
      outline: none;
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.53 8.15l-1.67 7.87c-.12.56-.45.7-.91.44l-2.52-1.86-1.22 1.17c-.13.13-.25.25-.51.25l.18-2.57 4.67-4.22c.2-.18-.04-.28-.32-.1l-5.77 3.64-2.49-.78c-.54-.17-.55-.54.11-.8l9.73-3.75c.45-.17.85.11.72.81z"/></svg>
      Channel Updates
    </h1>
    <div class="nav-links">
      <a href="#" class="nav-link active" id="mainFeedLink">Main</a>
      <a href="#" class="nav-link" id="pazFeedLink">P</a>
      <a href="#" class="nav-link" id="managementLink">⚙️</a>
    </div>
    <div class="header-right">
      <div class="filter-bar" id="filterBar"></div>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Loading...</span>
      </div>
    </div>
  </div>

  <div class="scroll-viewport" id="scrollViewport">
    <div class="scroll-track" id="postsContainer">
      <div class="loading-container">
        <div class="spinner"></div>
        <span>Fetching latest posts...</span>
      </div>
    </div>
  </div>

  <div class="management-container" id="managementContainer">
    <div class="management-section">
      <h3>Main Feed Channels</h3>
      <div class="channel-list" id="mainChannelList"></div>
      <button class="add-btn" onclick="addChannel('main')">Add Channel</button>
    </div>

    <div class="management-section">
      <h3>Paz Feed Channels</h3>
      <div class="channel-list" id="pazChannelList"></div>
      <button class="add-btn" onclick="addChannel('paz')">Add Channel</button>
    </div>

    <div class="management-section">
      <h3>Settings</h3>
      <div class="settings-grid">
        <div class="setting-item">
          <label>Refresh Interval (minutes)</label>
          <input type="number" id="refreshInterval" min="1" max="60">
        </div>
        <div class="setting-item">
          <label>Max Posts</label>
          <input type="number" id="maxPosts" min="5" max="100">
        </div>
        <div class="setting-item">
          <label>Scroll Speed</label>
          <input type="number" id="scrollSpeed" min="10" max="200">
        </div>
      </div>
    </div>

    <div class="config-actions">
      <button class="save-btn" onclick="saveConfiguration()">Save Configuration</button>
      <button class="download-btn" onclick="downloadConfig()">Download Config</button>
    </div>
  </div>

  <script>
    let allPosts = [];
    let activeFilter = null;
    let refreshMs = 5 * 60 * 1000;
    let refreshTimer = null;
    let scrollSpeed = 50;
    let scrollAnimId = null;
    let paused = false;
    let currentView = 'main'; // 'main', 'paz', or 'management'
    let fullConfig = {};

    async function fetchConfig() {
      try {
        const resp = await fetch('/api/config');
        const data = await resp.json();
        refreshMs = (data.refresh_interval_minutes || 5) * 60 * 1000;
        scrollSpeed = data.scroll_speed || 50;
      } catch (e) {}
    }

    async function fetchPosts() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      dot.classList.add('loading');
      text.textContent = 'Refreshing...';

      try {
        const resp = await fetch('/api/posts');
        if (!resp.ok) throw new Error('Failed');
        allPosts = await resp.json();
        // latest posts first (already sorted newest-first from API)
        renderFilters();
        renderPosts();
        const now = new Date();
        text.textContent = `Updated ${now.toLocaleTimeString()}`;
        dot.classList.remove('loading');
      } catch (e) {
        dot.classList.remove('loading');
        dot.style.background = '#ef5350';
        text.textContent = 'Error';
        document.getElementById('postsContainer').innerHTML =
          '<div class="error-msg">Failed to load posts. Will retry on next refresh.</div>';
      }
    }

    let manualScrollTimer = null;

    function startScrolling() {
      const viewport = document.getElementById('scrollViewport');
      viewport.scrollTop = 0;

      if (scrollAnimId) cancelAnimationFrame(scrollAnimId);

      paused = true;
      setTimeout(() => { paused = false; }, 2000);

      let lastTime = null;
      function tick(time) {
        if (!lastTime) lastTime = time;
        const dt = (time - lastTime) / 1000;
        lastTime = time;

        if (!paused) {
          const maxScroll = viewport.scrollHeight - viewport.clientHeight;
          if (maxScroll > 0) {
            viewport.scrollTop += scrollSpeed * dt;
            if (viewport.scrollTop >= maxScroll) {
              paused = true;
              setTimeout(() => {
                viewport.scrollTop = 0;
                lastTime = null;
                paused = false;
              }, 3000);
            }
          }
        }

        scrollAnimId = requestAnimationFrame(tick);
      }

      scrollAnimId = requestAnimationFrame(tick);
    }

    const viewport = document.getElementById('scrollViewport');

    viewport.addEventListener('wheel', () => {
      paused = true;
      clearTimeout(manualScrollTimer);
      manualScrollTimer = setTimeout(() => { paused = false; }, 4000);
    }, { passive: true });

    viewport.addEventListener('touchstart', () => {
      paused = true;
      clearTimeout(manualScrollTimer);
    }, { passive: true });

    viewport.addEventListener('touchend', () => {
      clearTimeout(manualScrollTimer);
      manualScrollTimer = setTimeout(() => { paused = false; }, 4000);
    }, { passive: true });

    function renderFilters() {
      const bar = document.getElementById('filterBar');
      const channels = [...new Set(allPosts.map(p => p.channel))];
      if (channels.length < 2) { bar.innerHTML = ''; return; }

      let html = `<button class="filter-btn ${!activeFilter ? 'active' : ''}" data-filter="">All</button>`;
      for (const ch of channels) {
        const title = allPosts.find(p => p.channel === ch)?.channel_title || ch;
        html += `<button class="filter-btn ${activeFilter === ch ? 'active' : ''}" data-filter="${ch}">${title}</button>`;
      }
      bar.innerHTML = html;
      bar.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.filter || null;
          renderFilters();
          renderPosts();
        });
      });
    }

    function formatDate(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      const now = new Date();
      const diffMs = now - d;
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 1) return 'just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours}h ago`;
      const diffDays = Math.floor(diffHours / 24);
      if (diffDays < 7) return `${diffDays}d ago`;
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
    }

    function sanitizeHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      tmp.querySelectorAll('a').forEach(a => {
        a.removeAttribute('onclick');
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      });
      return tmp.innerHTML;
    }

    function renderPosts() {
      const container = document.getElementById('postsContainer');
      const filtered = activeFilter ? allPosts.filter(p => p.channel === activeFilter) : allPosts;

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-msg">No posts to display.</div>';
        return;
      }

      container.innerHTML = filtered.map(post => {
        const avatarHtml = post.channel_photo
          ? `<img class="post-avatar" src="${post.channel_photo}" alt="">`
          : `<div class="post-avatar-placeholder">${(post.channel_title || post.channel)[0].toUpperCase()}</div>`;

        const mediaSrc = post.photo_url || post.video_thumb;
        let mediaSideHtml;
        if (mediaSrc) {
          mediaSideHtml = `<div class="post-media-side"><img src="${mediaSrc}" alt="" loading="lazy"></div>`;
        } else {
          const iconHtml = post.channel_photo
            ? `<img src="${post.channel_photo}" alt="">`
            : (post.channel_title || post.channel)[0].toUpperCase();
          mediaSideHtml = `<div class="post-media-side empty"><div class="channel-icon-large">${iconHtml}</div></div>`;
        }

        let linkPreviewHtml = '';
        if (post.link_preview && post.link_preview.title) {
          const lp = post.link_preview;
          linkPreviewHtml = `
            <a class="post-link-preview" href="${lp.url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
              <div class="post-link-preview-text">
                <div class="post-link-preview-title">${lp.title}</div>
                ${lp.description ? `<div class="post-link-preview-desc">${lp.description}</div>` : ''}
              </div>
            </a>`;
        }

        return `
          <div class="post-card" onclick="window.open('${post.post_url}','_blank')">
            ${mediaSideHtml}
            <div class="post-content">
              <div class="post-header">
                ${avatarHtml}
                <div class="post-meta">
                  <a class="post-channel" href="https://t.me/${post.channel}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${post.channel_title || post.channel}</a>
                  <div class="post-date">${formatDate(post.datetime)}</div>
                </div>
              </div>
              <div class="post-body">
                <div class="post-text">${sanitizeHtml(post.text_html)}</div>
              </div>
              ${linkPreviewHtml}
              <div class="post-footer">
                <div class="post-views">
                  <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                  ${post.views}
                </div>
                <a class="post-open-link" href="${post.post_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open in Telegram</a>
              </div>
            </div>
          </div>`;
      }).join('');

      startScrolling();
    }

    // Navigation functions
    function showView(view) {
      currentView = view;
      
      // Update nav links
      document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
      
      if (view === 'main') {
        document.getElementById('mainFeedLink').classList.add('active');
        document.getElementById('scrollViewport').style.display = 'flex';
        document.getElementById('managementContainer').style.display = 'none';
        fetchPosts();
      } else if (view === 'paz') {
        document.getElementById('pazFeedLink').classList.add('active');
        document.getElementById('scrollViewport').style.display = 'flex';
        document.getElementById('managementContainer').style.display = 'none';
        fetchPazPosts();
      } else if (view === 'management') {
        document.getElementById('managementLink').classList.add('active');
        document.getElementById('scrollViewport').style.display = 'none';
        document.getElementById('managementContainer').style.display = 'block';
        loadManagementInterface();
      }
    }

    async function fetchPazPosts() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      dot.classList.add('loading');
      text.textContent = 'Loading Paz feed...';

      try {
        const resp = await fetch('/api/paz/posts');
        if (!resp.ok) throw new Error('Failed');
        allPosts = await resp.json();
        renderFilters();
        renderPosts();
        const now = new Date();
        text.textContent = `Paz feed updated ${now.toLocaleTimeString()}`;
        dot.classList.remove('loading');
      } catch (e) {
        dot.classList.remove('loading');
        dot.style.background = '#ef5350';
        text.textContent = 'Error loading Paz feed';
        document.getElementById('postsContainer').innerHTML =
          '<div class="error-msg">Failed to load Paz posts. Will retry on next refresh.</div>';
      }
    }

    // Management interface functions
    async function loadManagementInterface() {
      try {
        const resp = await fetch('/api/admin/config');
        fullConfig = await resp.json();
        
        renderChannelList('main', fullConfig.channels || []);
        renderChannelList('paz', fullConfig.paz_channels || []);
        
        document.getElementById('refreshInterval').value = fullConfig.refresh_interval_minutes || 5;
        document.getElementById('maxPosts').value = fullConfig.max_posts || 20;
        document.getElementById('scrollSpeed').value = fullConfig.scroll_speed || 50;
      } catch (e) {
        console.error('Failed to load configuration:', e);
      }
    }

    function renderChannelList(type, channels) {
      const container = document.getElementById(type === 'main' ? 'mainChannelList' : 'pazChannelList');
      container.innerHTML = channels.map((channel, index) => `
        <div class="channel-item">
          <input type="text" value="${channel}" onchange="updateChannel('${type}', ${index}, this.value)">
          <button class="remove-btn" onclick="removeChannel('${type}', ${index})">Remove</button>
        </div>
      `).join('');
    }

    function addChannel(type) {
      const channels = type === 'main' ? (fullConfig.channels || []) : (fullConfig.paz_channels || []);
      channels.push('');
      
      if (type === 'main') {
        fullConfig.channels = channels;
      } else {
        fullConfig.paz_channels = channels;
      }
      
      renderChannelList(type, channels);
    }

    function removeChannel(type, index) {
      const channels = type === 'main' ? (fullConfig.channels || []) : (fullConfig.paz_channels || []);
      channels.splice(index, 1);
      
      if (type === 'main') {
        fullConfig.channels = channels;
      } else {
        fullConfig.paz_channels = channels;
      }
      
      renderChannelList(type, channels);
    }

    function updateChannel(type, index, value) {
      const channels = type === 'main' ? (fullConfig.channels || []) : (fullConfig.paz_channels || []);
      channels[index] = value;
      
      if (type === 'main') {
        fullConfig.channels = channels;
      } else {
        fullConfig.paz_channels = channels;
      }
    }

    async function saveConfiguration() {
      // Update config with current form values
      fullConfig.refresh_interval_minutes = parseInt(document.getElementById('refreshInterval').value);
      fullConfig.max_posts = parseInt(document.getElementById('maxPosts').value);
      fullConfig.scroll_speed = parseInt(document.getElementById('scrollSpeed').value);

      try {
        const resp = await fetch('/api/admin/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fullConfig)
        });
        
        const result = await resp.json();
        if (result.status === 'success') {
          alert('Configuration saved successfully!');
          // Reload config for the main app
          await fetchConfig();
        } else {
          alert('Failed to save configuration: ' + result.message);
        }
      } catch (e) {
        alert('Failed to save configuration: ' + e.message);
      }
    }

    function downloadConfig() {
      window.open('/api/admin/config/download', '_blank');
    }

    async function init() {
      // Set up navigation event listeners
      document.getElementById('mainFeedLink').addEventListener('click', (e) => {
        e.preventDefault();
        showView('main');
      });
      
      document.getElementById('pazFeedLink').addEventListener('click', (e) => {
        e.preventDefault();
        showView('paz');
      });
      
      document.getElementById('managementLink').addEventListener('click', (e) => {
        e.preventDefault();
        showView('management');
      });

      await fetchConfig();
      await fetchPosts();
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        if (currentView === 'main') {
          fetchPosts();
        } else if (currentView === 'paz') {
          fetchPazPosts();
        }
      }, refreshMs);
    }

    init();

    // Register service worker for PWA compliance
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/static/sw.js')
          .then(function(registration) {
            console.log('ServiceWorker registration successful');
          })
          .catch(function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
