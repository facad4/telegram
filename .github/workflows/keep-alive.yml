name: Keep Alive

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering
  push:
    branches: [ main ]
    paths: [ '.github/workflows/keep-alive.yml' ]

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging health endpoint at $(date)"
          response=$(curl -s -w "%{http_code}" -o /dev/null https://telegram-y5ic.onrender.com/health)
          echo "HTTP Status Code: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Service is alive and healthy"
          else
            echo "❌ Service returned status code: $response"
            exit 1
          fi
      
      - name: Ping main endpoint as backup
        if: failure()
        run: |
          echo "Health endpoint failed, trying main endpoint..."
          response=$(curl -s -w "%{http_code}" -o /dev/null https://telegram-y5ic.onrender.com/)
          echo "Main endpoint HTTP Status Code: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Main endpoint is responding"
          else
            echo "❌ Both endpoints failed"
            exit 1
          fi